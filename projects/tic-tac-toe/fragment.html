<div class="project-root" data-project="tic-tac-toe">
  <div class="ttt-wrap">
    <h2 class="ttt-title">Tic-Tac-Toe</h2>
    <p class="ttt-status" id="ttt-status">Your turn (X)</p>
    <div class="ttt-board" id="ttt-board">
      <button class="ttt-cell" data-idx="0"></button>
      <button class="ttt-cell" data-idx="1"></button>
      <button class="ttt-cell" data-idx="2"></button>
      <button class="ttt-cell" data-idx="3"></button>
      <button class="ttt-cell" data-idx="4"></button>
      <button class="ttt-cell" data-idx="5"></button>
      <button class="ttt-cell" data-idx="6"></button>
      <button class="ttt-cell" data-idx="7"></button>
      <button class="ttt-cell" data-idx="8"></button>
    </div>
    <div class="ttt-score">
      <div class="ttt-score-item"><span class="ttt-score-val" id="ttt-wins">0</span><span class="ttt-score-key">You</span></div>
      <div class="ttt-score-item"><span class="ttt-score-val" id="ttt-draws">0</span><span class="ttt-score-key">Draws</span></div>
      <div class="ttt-score-item"><span class="ttt-score-val" id="ttt-losses">0</span><span class="ttt-score-key">CPU</span></div>
    </div>
    <button class="ttt-reset" id="ttt-reset">New Game</button>
  </div>
</div>
