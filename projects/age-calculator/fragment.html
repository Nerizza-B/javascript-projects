<div class="project-root" data-project="age-calculator">
  <div class="age-wrap age-card-container">
    <h2 class="age-title">Age Calculator</h2>
    <div class="age-field">
      <label class="age-label" for="age-dob">Date of Birth</label>
      <input class="age-input" type="date" id="age-dob" />
    </div>
    <button class="age-btn" id="age-calc">Calculate</button>
    <div class="age-result" id="age-result" hidden>
      <div class="age-cards">
        <div class="age-card">
          <span class="age-val" id="age-years">0</span
          ><span class="age-key">Years</span>
        </div>
        <div class="age-card">
          <span class="age-val" id="age-months">0</span
          ><span class="age-key">Months</span>
        </div>
        <div class="age-card">
          <span class="age-val" id="age-days">0</span
          ><span class="age-key">Days</span>
        </div>
      </div>
      <p class="age-extra" id="age-extra"></p>
    </div>
  </div>
</div>
