<div class="project-root" data-project="snake-game">
  <div class="sn-wrap">
    <h2 class="sn-title">Snake</h2>
    <div class="sn-hud">
      <div class="sn-stat">Score<strong id="sn-score">0</strong></div>
      <div class="sn-stat">Best<strong id="sn-best">0</strong></div>
    </div>
    <canvas class="sn-canvas" id="sn-canvas" width="400" height="400"></canvas>
    <p class="sn-msg" id="sn-msg">Press any arrow key or tap to start</p>
    <div class="sn-dpad">
      <button class="sn-dpad-btn" data-dir="up">▲</button>
      <div class="sn-dpad-mid">
        <button class="sn-dpad-btn" data-dir="left">◀</button>
        <button class="sn-dpad-btn" data-dir="right">▶</button>
      </div>
      <button class="sn-dpad-btn" data-dir="down">▼</button>
    </div>
  </div>
</div>
