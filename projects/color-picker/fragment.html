<div class="project-root" data-project="color-picker">
  <div class="cp-card">
    <h2 class="cp-title">Color Picker</h2>
    <div class="cp-preview" id="cp-preview"></div>
    <input class="cp-input" type="color" id="cp-input" value="#6c63ff" />
    <div class="cp-values">
      <div class="cp-row">
        <span class="cp-fmt">HEX</span>
        <span class="cp-val" id="cp-hex">#6c63ff</span>
        <button class="cp-copy" data-target="cp-hex">Copy</button>
      </div>
      <div class="cp-row">
        <span class="cp-fmt">RGB</span>
        <span class="cp-val" id="cp-rgb">rgb(108, 99, 255)</span>
        <button class="cp-copy" data-target="cp-rgb">Copy</button>
      </div>
      <div class="cp-row">
        <span class="cp-fmt">HSL</span>
        <span class="cp-val" id="cp-hsl">hsl(244, 100%, 70%)</span>
        <button class="cp-copy" data-target="cp-hsl">Copy</button>
      </div>
    </div>
    <p class="cp-copied" id="cp-copied"></p>
  </div>
</div>
