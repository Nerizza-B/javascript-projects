<div class="project-root" data-project="stopwatch">
  <div class="sw-wrap">
    <h2 class="sw-title">Stopwatch</h2>
    <div class="sw-display" id="sw-display">00:00.00</div>
    <div class="sw-btns">
      <button class="sw-btn start" id="sw-start">Start</button>
      <button class="sw-btn lap"   id="sw-lap"   disabled>Lap</button>
      <button class="sw-btn reset" id="sw-reset"  disabled>Reset</button>
    </div>
    <ol class="sw-laps" id="sw-laps"></ol>
  </div>
</div>
