<div class="project-root" data-project="unit-converter">
  <div class="uc-card">
    <h2 class="uc-title">Unit Converter</h2>
    <div class="uc-tabs">
      <button class="uc-tab active" data-type="length">Length</button>
      <button class="uc-tab" data-type="weight">Weight</button>
      <button class="uc-tab" data-type="volume">Volume</button>
    </div>
    <div class="uc-body">
      <div class="uc-row">
        <input class="uc-input" id="uc-from-val" type="number" value="1" />
        <select class="uc-select" id="uc-from-unit"></select>
      </div>
      <div class="uc-equals">=</div>
      <div class="uc-row">
        <input class="uc-input" id="uc-to-val" type="number" readonly />
        <select class="uc-select" id="uc-to-unit"></select>
      </div>
    </div>
  </div>
</div>
