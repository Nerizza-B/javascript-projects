<div class="project-root" data-project="temperature-converter">
  <div class="tc-card">
    <div class="tc-title">Temperature Converter</div>
    <div class="tc-fields">
      <div class="tc-field">
        <label class="tc-label">Celsius (°C)</label>
        <input type="number" class="tc-input" id="tc-celsius" />
      </div>
      <div class="tc-field">
        <label class="tc-label">Fahrenheit (°F)</label>
        <input type="number" class="tc-input" id="tc-fahrenheit" />
      </div>
      <div class="tc-field">
        <label class="tc-label">Kelvin (K)</label>
        <input type="number" class="tc-input" id="tc-kelvin" />
      </div>
    </div>
    <button class="tc-reset" id="tc-reset">Reset</button>
    <p class="tc-hint" id="tc-hint"></p>
  </div>
</div>
