<div class="project-root" data-project="quiz-app">
  <div class="qa-card">
    <div class="qa-header">
      <span class="qa-progress" id="qa-progress">Question 1 / 10</span>
      <span class="qa-timer" id="qa-timer">15s</span>
    </div>
    <div class="qa-bar"><div class="qa-bar-fill" id="qa-bar-fill"></div></div>
    <p class="qa-question" id="qa-question">Loading…</p>
    <div class="qa-choices" id="qa-choices"></div>
    <div class="qa-result" id="qa-result" hidden>
      <h2 class="qa-score-title">Quiz Complete!</h2>
      <p class="qa-score-val" id="qa-score-val"></p>
      <button class="qa-btn" id="qa-restart">Play Again</button>
    </div>
  </div>
</div>
