<div class="project-root" data-project="number-guessing-game">
  <div class="ng-card">
    <h2 class="ng-title">Number Guessing</h2>
    <p class="ng-sub" id="ng-sub">I'm thinking of a number between <strong>1</strong> and <strong>100</strong></p>
    <div class="ng-input-row">
      <input class="ng-input" id="ng-input" type="number" min="1" max="100" placeholder="Your guess…" />
      <button class="ng-btn" id="ng-guess">Guess</button>
    </div>
    <p class="ng-hint" id="ng-hint"></p>
    <div class="ng-attempts">
      <span id="ng-attempts">0</span> attempts
    </div>
    <div class="ng-history" id="ng-history"></div>
    <button class="ng-reset" id="ng-reset">New Game</button>
  </div>
</div>
