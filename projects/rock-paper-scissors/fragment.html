<div class="project-root" data-project="rock-paper-scissors">
  <div class="rps-card">
    <h2 class="rps-title">Rock Paper Scissors</h2>
    <div class="rps-score">
      <div class="rps-score-box"><span class="rps-num" id="rps-win">0</span><span class="rps-lbl">You</span></div>
      <div class="rps-score-box draw"><span class="rps-num" id="rps-draw">0</span><span class="rps-lbl">Ties</span></div>
      <div class="rps-score-box loss"><span class="rps-num" id="rps-loss">0</span><span class="rps-lbl">CPU</span></div>
    </div>
    <div class="rps-arena">
      <div class="rps-hand" id="rps-player-hand">🤜</div>
      <span class="rps-vs">VS</span>
      <div class="rps-hand" id="rps-cpu-hand">🤛</div>
    </div>
    <p class="rps-result" id="rps-result">Choose your move!</p>
    <div class="rps-choices">
      <button class="rps-choice" data-move="rock">🪨<span>Rock</span></button>
      <button class="rps-choice" data-move="paper">📄<span>Paper</span></button>
      <button class="rps-choice" data-move="scissors">✂️<span>Scissors</span></button>
    </div>
    <button class="rps-reset" id="rps-reset">Reset Score</button>
  </div>
</div>
