<div class="project-root" data-project="whack-a-mole">
  <div class="wm-wrap">
    <h2 class="wm-title">Whack-a-Mole</h2>
    <div class="wm-hud">
      <span class="wm-stat">Score: <strong id="wm-score">0</strong></span>
      <span class="wm-stat">Time: <strong id="wm-time">30</strong>s</span>
      <span class="wm-stat">Best: <strong id="wm-best">0</strong></span>
    </div>
    <div class="wm-grid" id="wm-grid">
      <div class="wm-hole" data-hole="0"><div class="wm-mole">🐹</div></div>
      <div class="wm-hole" data-hole="1"><div class="wm-mole">🐹</div></div>
      <div class="wm-hole" data-hole="2"><div class="wm-mole">🐹</div></div>
      <div class="wm-hole" data-hole="3"><div class="wm-mole">🐹</div></div>
      <div class="wm-hole" data-hole="4"><div class="wm-mole">🐹</div></div>
      <div class="wm-hole" data-hole="5"><div class="wm-mole">🐹</div></div>
      <div class="wm-hole" data-hole="6"><div class="wm-mole">🐹</div></div>
      <div class="wm-hole" data-hole="7"><div class="wm-mole">🐹</div></div>
      <div class="wm-hole" data-hole="8"><div class="wm-mole">🐹</div></div>
    </div>
    <button class="wm-btn" id="wm-start">Start Game</button>
  </div>
</div>
