<div class="project-root" data-project="typing-speed-test">
  <div class="ts-wrap">
    <h2 class="ts-title">Typing Speed Test</h2>
    <div class="ts-hud">
      <div class="ts-stat"><span class="ts-num" id="ts-wpm">0</span><span class="ts-lbl">WPM</span></div>
      <div class="ts-stat"><span class="ts-num" id="ts-acc">100</span><span class="ts-lbl">% Accuracy</span></div>
      <div class="ts-stat"><span class="ts-num" id="ts-time">60</span><span class="ts-lbl">Seconds</span></div>
    </div>
    <div class="ts-passage" id="ts-passage"></div>
    <textarea class="ts-input" id="ts-input" placeholder="Start typing to begin the test…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
    <button class="ts-restart" id="ts-restart">Restart</button>
  </div>
</div>
