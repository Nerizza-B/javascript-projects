<div class="project-root" data-project="word-counter">
  <div class="wc-wrap">
    <h2 class="wc-title">Word Counter</h2>
    <textarea
      class="wc-textarea"
      id="wc-text"
      placeholder="Start typing or paste your text here…"
      rows="10"
    ></textarea>
    <div class="wc-stats">
      <div class="wc-stat">
        <span class="wc-num" id="wc-words">0</span
        ><span class="wc-label">Words</span>
      </div>
      <div class="wc-stat">
        <span class="wc-num" id="wc-chars">0</span
        ><span class="wc-label">Characters</span>
      </div>
      <div class="wc-stat">
        <span class="wc-num" id="wc-no-space">0</span
        ><span class="wc-label">No Spaces</span>
      </div>
      <div class="wc-stat">
        <span class="wc-num" id="wc-sentences">0</span
        ><span class="wc-label">Sentences</span>
      </div>
      <div class="wc-stat">
        <span class="wc-num" id="wc-para">0</span
        ><span class="wc-label">Paragraphs</span>
      </div>
      <div class="wc-stat">
        <span class="wc-num" id="wc-read">0</span
        ><span class="wc-label">Min Read</span>
      </div>
    </div>
    <button class="wc-clear" id="wc-clear">Clear</button>
  </div>
</div>
