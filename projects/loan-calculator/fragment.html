<div class="project-root" data-project="loan-calculator">
  <div class="loan-wrap">
    <h2 class="loan-title">Loan Calculator</h2>
    <div class="loan-inputs">
      <div class="loan-field">
        <label class="loan-label" for="loan-principal">Loan Amount ($)</label>
        <input class="loan-input" type="number" id="loan-principal" min="0" step="100" value="10000" />
      </div>
      <div class="loan-field">
        <label class="loan-label" for="loan-rate">Annual Interest Rate (%)</label>
        <input class="loan-input" type="number" id="loan-rate" min="0" max="100" step="0.1" value="5" />
      </div>
      <div class="loan-field">
        <label class="loan-label" for="loan-term">Loan Term (years)</label>
        <input class="loan-input" type="number" id="loan-term" min="1" max="50" step="1" value="5" />
      </div>
    </div>
    <div class="loan-results">
      <div class="loan-card">
        <span class="loan-card-val" id="loan-monthly">$0.00</span>
        <span class="loan-card-key">Monthly Payment</span>
      </div>
      <div class="loan-card">
        <span class="loan-card-val" id="loan-total">$0.00</span>
        <span class="loan-card-key">Total Payment</span>
      </div>
      <div class="loan-card">
        <span class="loan-card-val" id="loan-interest">$0.00</span>
        <span class="loan-card-key">Total Interest</span>
      </div>
    </div>
  </div>
</div>
