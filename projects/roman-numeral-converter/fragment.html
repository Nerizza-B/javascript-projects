<div class="project-root" data-project="roman-numeral-converter">
  <div class="rn-wrap">
    <h2 class="rn-title">Roman Numeral Converter</h2>

    <div class="rn-card">
      <label class="rn-label">Number → Roman</label>
      <div class="rn-row">
        <input
          class="rn-input"
          id="rn-num"
          type="number"
          min="1"
          max="3999"
          placeholder="e.g. 1994"
        />
        <button class="rn-btn" id="rn-to-roman">Convert</button>
      </div>
      <div class="rn-result" id="rn-roman-out">—</div>
    </div>

    <div class="rn-card">
      <label class="rn-label">Roman → Number</label>
      <div class="rn-row">
        <input
          class="rn-input"
          id="rn-roman"
          type="text"
          placeholder="e.g. MCMXCIV"
          style="text-transform: uppercase"
        />
        <button class="rn-btn" id="rn-to-num">Convert</button>
      </div>
      <div class="rn-result" id="rn-num-out">—</div>
    </div>

    <div class="rn-table-wrap">
      <p class="rn-table-title">Reference</p>
      <div class="rn-table" id="rn-table"></div>
    </div>
  </div>
</div>
